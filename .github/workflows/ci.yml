name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.23'
  PNPM_VERSION: '9'

jobs:
  node-ci:
    name: Node.js CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: algoarena_test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: algoarena_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://algoarena_test:test@localhost:5432/algoarena_test
        run: pnpm db:generate

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://algoarena_test:test@localhost:5432/algoarena_test
        run: pnpm --filter @algoarena/db db:migrate:dev

      - name: Lint
        run: pnpm lint

      - name: Test
        env:
          DATABASE_URL: postgresql://algoarena_test:test@localhost:5432/algoarena_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: pnpm test

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  go-ci:
    name: Go Judge CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: apps/judge-service/go.sum

      - name: Build
        working-directory: apps/judge-service
        run: go build ./...

      - name: Vet
        working-directory: apps/judge-service
        run: go vet ./...

      - name: Test (unit — no isolate needed)
        working-directory: apps/judge-service
        run: go test -short ./...

      - name: Vulnerability check
        working-directory: apps/judge-service
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
