apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: platform-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ECR_REGISTRY/algoarena/api-gateway:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: '4000'
            - name: NODE_ENV
              value: production
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: host
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-keys
                  key: public-key
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: allowed-origins
            - name: AUTH_SERVICE_URL
              value: 'http://auth-service:4001'
            - name: USER_SERVICE_URL
              value: 'http://user-service:4002'
            - name: PROBLEM_SERVICE_URL
              value: 'http://problem-service:4003'
            - name: SUBMISSION_SERVICE_URL
              value: 'http://submission-service:4004'
            - name: CONTEST_SERVICE_URL
              value: 'http://contest-service:4006'
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: platform-prod
spec:
  selector:
    app: api-gateway
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
